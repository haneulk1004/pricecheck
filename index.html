<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRICE_CHECK | V90 (User Key)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .street-border { border-left: 8px solid #fff; }
        .btn-lock:disabled { opacity: 0.3; cursor: not-allowed; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .img-preview { object-fit: contain; width: 100%; max-height: 300px; background: #111; border: 1px solid #333; border-radius: 8px; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .heart-beat { animation: heartBeat 0.3s ease-in-out; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MODEL_NAME = "gemini-2.5-flash";

        Chart.register(ChartDataLabels);

        function App() {
            // [System State]
            const [userApiKey, setUserApiKey] = useState(""); // 사용자 API 키
            const [isKeyEntered, setIsKeyEntered] = useState(false); // 키 입력 여부

            const [view, setView] = useState('home'); 
            const [isLoading, setIsLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [errorMsg, setErrorMsg] = useState("");
            
            // [Favorites]
            const [favorites, setFavorites] = useState([]);

            // [Data]
            const [previewImg, setPreviewImg] = useState(null);
            const [identifiedName, setIdentifiedName] = useState(""); 
            const [productData, setProductData] = useState({ 
                name: "", officialUrl: "", retail: 0, 
                naver: 0, kream: 0, soldout: 0, coupang: 0, gmarket: 0, street11: 0, ssg: 0, lotteon: 0, musinsa: 0
            });
            const [manualSearch, setManualSearch] = useState("");
            
            const cameraInputRef = useRef(null);
            const uploadInputRef = useRef(null);
            const chartRef = useRef(null);
            const keyInputRef = useRef(null);

            // [Effect] 초기 실행 시 로컬스토리지 체크
            useEffect(() => {
                // 1. 즐겨찾기 로드
                const savedFav = localStorage.getItem('priceCheckFavorites');
                if (savedFav) try { setFavorites(JSON.parse(savedFav)); } catch (e) {}

                // 2. API 키 로드
                const savedKey = localStorage.getItem('priceCheckApiKey');
                if (savedKey) {
                    setUserApiKey(savedKey);
                    setIsKeyEntered(true);
                }
            }, []);

            // [Effect] 즐겨찾기 변경 시 저장
            useEffect(() => {
                localStorage.setItem('priceCheckFavorites', JSON.stringify(favorites));
            }, [favorites]);

            const handleLogin = (e) => {
                e.preventDefault();
                const inputKey = keyInputRef.current.value.trim();
                if (!inputKey) {
                    setErrorMsg("API 키를 입력해주세요.");
                    return;
                }
                if (!inputKey.startsWith("AIza")) {
                    setErrorMsg("유효하지 않은 API 키 형식입니다. (AIza로 시작)");
                    return;
                }
                
                // 키 저장 및 로그인
                localStorage.setItem('priceCheckApiKey', inputKey);
                setUserApiKey(inputKey);
                setIsKeyEntered(true);
                setErrorMsg("");
            };

            const handleLogout = () => {
                if(confirm("API 키를 삭제하고 초기 화면으로 돌아가시겠습니까?")) {
                    localStorage.removeItem('priceCheckApiKey');
                    setUserApiKey("");
                    setIsKeyEntered(false);
                    goHome();
                }
            };

            const goHome = () => {
                setManualSearch("");
                setIdentifiedName("");
                setPreviewImg(null);
                setErrorMsg("");
                setView('home');
            };

            const toggleFavorite = () => {
                const exists = favorites.find(f => f.name === productData.name);
                if (exists) {
                    setFavorites(favorites.filter(f => f.name !== productData.name));
                } else {
                    const itemToSave = { ...productData, savedAt: Date.now() };
                    setFavorites([itemToSave, ...favorites]);
                }
            };

            const loadFromFavorites = (item) => {
                setProductData(item);
                setErrorMsg("");
                setView('result');
            };

            const deleteFavorite = (e, name) => {
                e.stopPropagation(); 
                if(confirm("정말 삭제하시겠습니까?")) {
                    setFavorites(favorites.filter(f => f.name !== name));
                }
            };

            const callGeminiAPI = async (prompt, imageBase64 = null) => {
                // [수정] 전역 상수가 아닌, 상태(State)에 저장된 사용자 키 사용
                if (!userApiKey) {
                    setErrorMsg("API 키가 없습니다. 다시 로그인해주세요.");
                    setIsKeyEntered(false);
                    throw new Error("API Key Missing");
                }

                const requestBody = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            ...(imageBase64 ? [{ inline_data: { mime_type: "image/jpeg", data: imageBase64 } }] : [])
                        ]
                    }],
                    safetySettings: [
                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }
                    ]
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${userApiKey}`, {
                    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                if (!response.ok) {
                    const errorDetails = data.error?.message || "Unknown API Error";
                    if (errorDetails.includes("quota") || response.status === 429) {
                        throw new Error("RATE_LIMIT");
                    }
                    if (errorDetails.includes("API key not valid")) {
                        throw new Error("INVALID_KEY");
                    }
                    throw new Error(errorDetails);
                }
                return data;
            };

            const analyzeImage = async (base64Image) => {
                setIsLoading(true);
                setErrorMsg("");
                setLoadingMsg("AI Analyzing..."); 
                const prompt = `Identify the product in this image. Response format: JSON ONLY { "productName": "..." }`;
                try {
                    const data = await callGeminiAPI(prompt, base64Image);
                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("No response");
                    
                    const cleanText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    const jsonMatch = cleanText.match(/\{[\s\S]*\}/);
                    
                    if (jsonMatch) {
                        setIdentifiedName(JSON.parse(jsonMatch[0]).productName);
                    } else {
                        setIdentifiedName(cleanText.slice(0, 50));
                    }
                    setPreviewImg(`data:image/jpeg;base64,${base64Image}`);
                    setView('confirm');
                } catch (e) {
                    if (e.message === "RATE_LIMIT") {
                        setErrorMsg("⚠️ 사용량 초과! 40초 후 다시 시도해주세요.");
                    } else if (e.message === "INVALID_KEY") {
                        setErrorMsg("잘못된 API 키입니다. 로그아웃 후 다시 입력하세요.");
                        setIsKeyEntered(false); // 키 입력 화면으로 강제 이동
                        localStorage.removeItem('priceCheckApiKey');
                    } else {
                        setErrorMsg("분석 실패: " + e.message);
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            const fetchMarketData = async (queryName) => {
                setIsLoading(true);
                setErrorMsg("");
                setLoadingMsg("AI Searching Prices..."); 

                const prompt = `
                ROLE: Professional Product Valuation Expert.
                TASK: Estimate the REAL market price for "${queryName}" in KRW.
                INSTRUCTIONS: Use internal knowledge. Luxury > High, Budget > Low. NO ZERO.
                JSON OUTPUT: { "name": "${queryName}", "officialUrl": "http...", "retail": Number, "naver": Number, "kream": Number, "soldout": Number, "coupang": Number, "gmarket": Number, "street11": Number, "ssg": Number, "lotteon": Number, "musinsa": Number }`;

                try {
                    const data = await callGeminiAPI(prompt, null); 
                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const cleanText = rawText ? rawText.replace(/```json/g, "").replace(/```/g, "").trim() : "";
                    const jsonMatch = cleanText.match(/\{[\s\S]*\}/);
                    
                    if (!jsonMatch) throw new Error("AI Refused"); 

                    let parsedData = JSON.parse(jsonMatch[0]);

                    const platforms = ["retail", "naver", "kream", "soldout", "coupang", "gmarket", "street11", "ssg", "lotteon", "musinsa"];
                    let validPrices = [];
                    platforms.forEach(key => { if (parsedData[key] > 0) validPrices.push(parsedData[key]); });
                    let avgPrice = validPrices.length > 0 ? validPrices.reduce((a, b) => a + b, 0) / validPrices.length : 0;

                    platforms.forEach(key => {
                        if (!parsedData[key] || parsedData[key] <= 0) {
                            parsedData[key] = avgPrice > 0 ? avgPrice : 0; 
                        }
                    });

                    parsedData.name = parsedData.name || queryName;
                    if (!parsedData.officialUrl || !parsedData.officialUrl.startsWith("http")) {
                        parsedData.officialUrl = `https://www.google.com/search?q=${encodeURIComponent(queryName)}`;
                    }

                    setProductData(parsedData);
                    setView('result');

                } catch (e) {
                    console.error(e);
                    if (e.message === "RATE_LIMIT") {
                        setErrorMsg("⚠️ 사용량 초과! 40초 후 다시 시도해주세요.");
                    } else if (e.message === "INVALID_KEY") {
                        setErrorMsg("잘못된 API 키입니다. 다시 입력해주세요.");
                        setIsKeyEntered(false);
                        localStorage.removeItem('priceCheckApiKey');
                    } else {
                        setErrorMsg("AI 분석 실패: " + e.message);
                    }
                } finally { setIsLoading(false); }
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { 
                        analyzeImage(reader.result.split(',')[1]); 
                        e.target.value = '';
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleManualSearch = (e) => {
                e.preventDefault();
                if (!manualSearch.trim() || isLoading) return;
                fetchMarketData(manualSearch); 
            };

            const renderPriceChart = (prices) => {
                const ctxElement = document.getElementById('priceChart');
                if (!ctxElement) return;
                const ctx = ctxElement.getContext('2d');
                if (chartRef.current) chartRef.current.destroy();
                
                const gradientBg = ctx.createLinearGradient(0, 0, 0, 400);
                gradientBg.addColorStop(0, 'rgba(255, 255, 255, 0.95)'); 
                gradientBg.addColorStop(1, 'rgba(255, 255, 255, 0.1)');

                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['정가', '네이버', '크림', '솔드아웃', '쿠팡', 'G마켓', '11번가', 'SSG', '롯데온', '무신사'],
                        datasets: [{ 
                            data: [ prices.retail, prices.naver, prices.kream, prices.soldout, prices.coupang, prices.gmarket, prices.street11, prices.ssg, prices.lotteon, prices.musinsa ], 
                            backgroundColor: gradientBg, borderColor: '#ffffff', borderWidth: 1, borderRadius: 6, barPercentage: 0.7, hoverBackgroundColor: '#ffffff', hoverBorderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        layout: { padding: { top: 30, bottom: 10, left: 10, right: 10 } },
                        plugins: { legend: { display: false }, datalabels: { color: '#ffffff', anchor: 'end', align: 'top', formatter: (val) => val > 0 ? '₩' + Math.round(val/1000) + 'k' : '-' } },
                        scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#a1a1aa', font: { weight: 'bold', size: 10 } } } }
                    }
                });
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                if (view === 'result' && !isLoading) setTimeout(() => renderPriceChart(productData), 100);
            }, [view, isLoading, productData]);

            const isFav = favorites.some(f => f.name === productData.name);

            // [VIEW 1] 키 입력 화면 (로그인)
            if (!isKeyEntered) {
                return (
                    <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center p-8">
                        <div className="w-full max-w-md space-y-8 fade-in">
                            <div className="text-center space-y-2">
                                <h1 className="text-5xl font-black italic tracking-tighter">PRICE_CHECK</h1>
                                <p className="text-zinc-500 font-bold uppercase tracking-widest">System Access Required</p>
                            </div>
                            
                            <form onSubmit={handleLogin} className="bg-zinc-900 border border-zinc-800 p-8 rounded-lg shadow-2xl space-y-6">
                                <div>
                                    <label className="block text-xs font-bold uppercase text-zinc-500 mb-2">Google Gemini API Key</label>
                                    <input 
                                        type="password" 
                                        ref={keyInputRef}
                                        placeholder="AIza..." 
                                        className="w-full bg-black border border-zinc-700 p-4 rounded text-white font-mono focus:border-white outline-none transition-all"
                                    />
                                </div>
                                
                                {errorMsg && <p className="text-red-500 text-sm font-bold text-center animate-pulse">{errorMsg}</p>}
                                
                                <button type="submit" className="w-full bg-white text-black py-4 font-black uppercase tracking-wider hover:bg-zinc-200 transition-colors">
                                    Enter System
                                </button>
                                
                                <div className="text-center pt-4 border-t border-zinc-800">
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-xs text-zinc-500 hover:text-white underline">
                                        API 키가 없으신가요? (Get API Key)
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // [VIEW 2] 메인 앱 화면 (로그인 후)
            return (
                <div className="min-h-screen bg-black text-white">
                    <nav className="fixed top-0 left-0 w-full z-[100] p-6 flex justify-between items-center bg-black/90 backdrop-blur-xl border-b border-zinc-900">
                        <button onClick={goHome} className="text-xl font-black italic tracking-tighter uppercase cursor-pointer">Price_Check</button>
                        
                        <div className="flex gap-4">
                            {/* 보관함 버튼 */}
                            <button onClick={() => setView('saved')} className="relative group p-2">
                                <i data-lucide="folder-heart" className="w-6 h-6 text-zinc-400 group-hover:text-white transition-colors"></i>
                                {favorites.length > 0 && <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>}
                            </button>
                            {/* 로그아웃 버튼 */}
                            <button onClick={handleLogout} className="group p-2" title="API Key Reset">
                                <i data-lucide="key" className="w-6 h-6 text-zinc-400 group-hover:text-red-500 transition-colors"></i>
                            </button>
                        </div>
                    </nav>

                    {view === 'home' && (
                        <div className="flex flex-col min-h-screen p-8 pt-32 justify-center max-w-5xl mx-auto">
                             {isLoading ? ( <div className="flex flex-col items-center justify-center"><div className="spinner mb-8"></div><p className="font-black italic animate-pulse uppercase tracking-widest">{loadingMsg}</p></div> ) : (
                                <>
                                <h2 className="text-7xl md:text-[10rem] font-black tracking-tighter leading-[0.8] mb-6 italic uppercase text-center md:text-left text-zinc-100">CHECK <br/><span className="text-zinc-600">& SEARCH</span></h2>
                                
                                <p className="text-zinc-500 text-xs md:text-sm font-bold tracking-wider mb-8 text-center md:text-left italic">
                                    <span className="text-zinc-300">Pure AI Engine</span> : 가짜 데이터 없는 순수 AI 지능
                                </p>

                                {errorMsg && (
                                    <div className="mb-6 p-4 bg-red-900/50 border border-red-500 rounded text-red-200 font-bold text-center error-shake">
                                        {errorMsg}
                                    </div>
                                )}

                                <div className="w-full max-w-4xl mx-auto md:mx-0 space-y-6">
                                    <form onSubmit={handleManualSearch} className="flex flex-col md:flex-row gap-3 w-full">
                                        <input type="text" placeholder="제품명 입력..." value={manualSearch} onChange={(e) => setManualSearch(e.target.value)} className="flex-1 bg-zinc-900 border border-zinc-800 p-6 font-black focus:border-white outline-none text-xl transition-all" />
                                        <button type="submit" disabled={isLoading} className="bg-white text-black px-12 py-6 font-black uppercase hover:bg-zinc-200 btn-lock transition-colors">Search</button>
                                    </form>
                                    <div className="grid grid-cols-2 gap-4 w-full">
                                        <button onClick={() => !isLoading && cameraInputRef.current.click()} className="border-4 border-white p-6 font-black text-2xl flex items-center justify-center gap-4 hover:bg-white hover:text-black btn-lock"><i data-lucide="camera" className="w-8 h-8"></i> SEARCH</button>
                                        <button onClick={() => !isLoading && uploadInputRef.current.click()} className="border-4 border-zinc-800 p-6 font-black text-2xl flex items-center justify-center gap-4 hover:bg-white hover:text-black text-zinc-500 hover:text-black btn-lock"><i data-lucide="upload" className="w-8 h-8"></i> UPLOAD</button>
                                    </div>
                                </div>
                                </>
                            )}
                        </div>
                    )}

                    {view === 'saved' && (
                        <div className="pt-32 pb-20 p-8 max-w-5xl mx-auto min-h-screen">
                            <div className="flex items-center gap-4 mb-10">
                                <button onClick={goHome}><i data-lucide="arrow-left" className="w-6 h-6"></i></button>
                                <h3 className="text-3xl font-black italic uppercase tracking-tighter">My Saved List</h3>
                            </div>
                            
                            {favorites.length === 0 ? (
                                <div className="text-center py-20 text-zinc-600 font-bold text-xl italic">
                                    저장된 상품이 없습니다. <br/> 검색 후 하트 버튼을 눌러보세요!
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {favorites.map((item, idx) => (
                                        <div key={idx} onClick={() => loadFromFavorites(item)} className="bg-zinc-900 border border-zinc-800 p-6 rounded-lg cursor-pointer hover:border-white transition-all group relative">
                                            <button onClick={(e) => deleteFavorite(e, item.name)} className="absolute top-4 right-4 text-zinc-600 hover:text-red-500 z-10 p-2"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                            <h4 className="text-xl font-black italic uppercase mb-2 truncate pr-8">{item.name}</h4>
                                            <p className="text-zinc-400 text-xs font-bold mb-4">Saved: {new Date(item.savedAt).toLocaleDateString()}</p>
                                            <div className="flex justify-between items-end">
                                                <span className="text-xs text-zinc-500 font-bold uppercase tracking-widest">Est. Price</span>
                                                <span className="text-lg font-black text-white">₩ {Math.round(item.retail).toLocaleString()}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {view === 'confirm' && (
                        <div className="flex flex-col min-h-screen p-8 pt-32 items-center justify-center max-w-3xl mx-auto">
                            <h3 className="text-2xl font-black italic uppercase mb-8 tracking-tighter">Confirm Product</h3>
                            {errorMsg && (
                                <div className="mb-6 p-4 bg-red-900/50 border border-red-500 rounded text-red-200 font-bold text-center error-shake w-full">
                                    {errorMsg}
                                </div>
                            )}
                            <div className="w-full bg-zinc-900 p-6 border border-zinc-800 rounded-lg shadow-2xl">
                                {previewImg && <img src={previewImg} alt="Preview" className="img-preview mb-6" />}
                                <input type="text" value={identifiedName} onChange={(e) => setIdentifiedName(e.target.value)} className="w-full bg-black border-2 border-zinc-700 p-4 font-bold text-lg mb-6 focus:border-white outline-none text-white" />
                                <div className="flex gap-4">
                                    <button onClick={goHome} className="flex-1 py-4 font-bold text-zinc-500 hover:text-white border border-zinc-800 hover:border-white transition-all uppercase">Retake</button>
                                    <button onClick={() => fetchMarketData(identifiedName)} className="flex-[2] bg-white text-black py-4 font-black uppercase hover:bg-zinc-200 shadow-lg">Confirm & Search</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'result' && (
                        <div className="pt-32 pb-40 p-6 md:p-12 overflow-y-auto max-h-screen relative">
                            <div className="flex justify-between items-center mb-10 max-w-7xl mx-auto w-full">
                                <button onClick={goHome} className="font-black text-xs opacity-60 flex items-center gap-2 italic uppercase tracking-widest hover:opacity-100 transition-all cursor-pointer"><i data-lucide="arrow-left"></i> close_view</button>
                            </div>
                            
                            <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16">
                                <div className="space-y-12">
                                    <div className="p-6 md:p-10 border border-zinc-900 bg-black h-[400px] md:h-[500px] shadow-2xl">
                                        <div className="h-full w-full"><canvas id="priceChart"></canvas></div>
                                    </div>
                                </div>
                                <div className="flex flex-col">
                                    <div className="flex items-start justify-between mb-12 pl-8 street-border">
                                        <h3 className="text-4xl md:text-7xl font-black italic uppercase leading-[0.9] break-words tracking-tighter italic flex-1">{productData.name}</h3>
                                        <button onClick={toggleFavorite} className="p-4 ml-4 transition-transform active:scale-90 hover:bg-zinc-900 rounded-full">
                                            <i data-lucide="heart" className={`w-8 h-8 ${isFav ? "fill-red-600 text-red-600 heart-beat" : "text-zinc-500"}`}></i>
                                        </button>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                        <PriceBox label="OFFICIAL" price={productData.retail} link={productData.officialUrl} highlight />
                                        <PriceBox label="NAVER" price={productData.naver} link={`https://search.shopping.naver.com/search/all?query=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="KREAM" price={productData.kream} link={`https://kream.co.kr/search?keyword=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="COUPANG" price={productData.coupang} link={`https://www.coupang.com/np/search?q=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="GMARKET" price={productData.gmarket} link={`https://browse.gmarket.co.kr/search?keyword=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="11st" price={productData.street11} link={`https://search.11st.co.kr/Search.tmall?kwd=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="SSG" price={productData.ssg} link={`https://www.ssg.com/search.ssg?query=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="LOTTE ON" price={productData.lotteon} link={`https://www.lotteon.com/search/search/search.ecn?render=search&q=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="MUSINSA" price={productData.musinsa} link={`https://www.musinsa.com/search/goods?keyword=${encodeURIComponent(productData.name)}`} />
                                        <PriceBox label="SOLDOUT" price={productData.soldout} link={`https://www.soldout.co.kr/search/product/list?keyword=${encodeURIComponent(productData.name)}`} />
                                    </div>
                                    <div className="border-t border-zinc-900 pt-6">
                                        <p className="text-zinc-500 text-[10px] md:text-xs text-center font-bold tracking-wide">
                                            * 본 데이터는 AI가 보유한 <span className="text-zinc-300">지식 기반 추정가</span>입니다.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="fixed bottom-0 left-0 w-full bg-black/80 backdrop-blur-xl border-t border-zinc-800 p-4 z-[150] slide-up">
                                <div className="max-w-4xl mx-auto flex gap-3 items-center">
                                    <form onSubmit={handleManualSearch} className="flex-1 flex gap-2">
                                        <input 
                                            type="text" 
                                            placeholder="다른 제품 검색..." 
                                            value={manualSearch} 
                                            onChange={(e) => setManualSearch(e.target.value)} 
                                            className="flex-1 bg-zinc-900 border border-zinc-700 p-3 pl-4 rounded font-bold text-sm focus:border-white outline-none text-white placeholder-zinc-500" 
                                        />
                                        <button type="submit" disabled={isLoading} className="bg-white text-black px-6 rounded font-black text-sm hover:bg-zinc-200">
                                            GO
                                        </button>
                                    </form>
                                    <div className="flex gap-2 border-l border-zinc-700 pl-3">
                                        <button onClick={() => cameraInputRef.current.click()} className="p-3 bg-zinc-800 rounded hover:bg-zinc-700 text-white">
                                            <i data-lucide="camera" className="w-5 h-5"></i>
                                        </button>
                                        <button onClick={() => uploadInputRef.current.click()} className="p-3 bg-zinc-800 rounded hover:bg-zinc-700 text-white">
                                            <i data-lucide="upload" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <input type="file" ref={cameraInputRef} onChange={handleFile} accept="image/*" capture="environment" className="hidden" />
                    <input type="file" ref={uploadInputRef} onChange={handleFile} accept="image/*" className="hidden" />
                </div>
            );
        }
        const PriceBox = ({ label, price, highlight, link }) => (
            <a href={link} target="_blank" rel="noopener noreferrer" className={`flex justify-between items-center p-5 border transition-all hover:scale-[1.02] active:scale-95 ${highlight ? 'bg-white text-black border-white' : 'border-zinc-900 text-white hover:border-zinc-600'}`}>
                <div className="flex flex-col"><span className="font-black uppercase italic text-[9px] tracking-[0.2em] mb-1">{label}</span>
                <span className="text-xs text-zinc-400 font-bold">Visit Link <i className="inline-block w-3 h-3 ml-1" data-lucide="arrow-up-right"></i></span></div>
                <span className="text-xl font-black italic tracking-tighter">{price > 0 ? `₩ ${Math.round(price).toLocaleString()}` : "N/A"}</span>
            </a>
        );
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
